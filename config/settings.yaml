legacy_system:
  api_endpoint: "http://legacy-system.example.com/api"
  auth_token: "placeholder"

data_sources:
  databases:
    - type: mysql
      host: localhost
  files:
    - path: /data/input.csv

knowledge_base:
  vector_db: "chroma"
  embedding_model: "all-MiniLM-L6-v2"

analysis:
  output_dir: "/home/workdir/artifacts/reports"

# 业务数据库配置 - 用于理解整个系统业务
business_db:
  type: "mysql"  # or postgresql, etc.
  host: "localhost"
  port: 3306
  database: "legacy_business"
  tables:
    - projects
    - transactions
    - customers
  description: "核心业务数据库，包含项目、交易、客户等实体"