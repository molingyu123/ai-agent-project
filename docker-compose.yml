services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ai_agent
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ai_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://user:password@postgres:5432/ai_agent
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND_URL: redis://redis:6379/1
      VECTOR_STORE_PROVIDER: pgvector

  worker:
    build: .
    env_file:
      - .env
    command: celery -A data_pipeline.scheduler.celery_tasks worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://user:password@postgres:5432/ai_agent
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND_URL: redis://redis:6379/1
      VECTOR_STORE_PROVIDER: pgvector

  beat:
    build: .
    env_file:
      - .env
    command: celery -A data_pipeline.scheduler.celery_tasks beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://user:password@postgres:5432/ai_agent
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND_URL: redis://redis:6379/1
      VECTOR_STORE_PROVIDER: pgvector

volumes:
  postgres_data:
